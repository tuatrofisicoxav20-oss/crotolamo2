name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencias del sistema (portaudio para sounddevice)
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev libsndfile1

      - name: Instalar el proyecto (dev + voice)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,voice]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (tipos)
        run: mypy crotolamo interfaces

      - name: Pytest
        run: pytest -q
