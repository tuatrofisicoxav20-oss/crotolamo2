# Configuración de Crotolamo 2.
# CERO hardcodeo: todas las rutas usan ~ y se expanden en settings.py.
# El usuario actual se detecta solo (nada de /home/exitili quemado).
#
# Para overrides locales sin tocar este archivo, crea config/crotolamo.local.toml
# (está en .gitignore) con solo las claves que quieras cambiar.

[paths]
# ~ se expande al home del usuario que corre el proceso.
home       = "~"
documentos = "~/Documentos"
descargas  = "~/Descargas"
# Voz Piper (Fase 5). Apunta a donde tengas el modelo .onnx.
voces      = "~/Documentos/crotolamo2/voices"
# Base de datos de memoria persistente (Fase 4).
db         = "~/.crotolamo/crotolamo.sqlite"
# Notas creadas por la tool create_note (Fase 3).
notas      = "~/Documentos/crotolamo_notas"

# Allowlist de raíces donde las tools de archivo pueden operar (Fase 3).
# El guard rechaza cualquier ruta fuera de estas raíces.
allowed_roots = [
    "~/Documentos",
    "~/Descargas",
    "~/.crotolamo",
]

# Proyectos del patrón sobre los que Crotolamo puede razonar (Fase 3).
[projects]
crotolamo  = "~/Documentos/crotolamo2"
huevonitis = "~/Documentos/huevonitis 4"

[logging]
# Nivel de log de diagnóstico (DEBUG/INFO/WARNING/ERROR). La env CROTOLAMO_LOG manda.
level = "INFO"

[llm]
host        = "http://localhost:11434"
model       = "qwen2.5-coder:7b"
temperature = 0.2
# En CPU (sin GPU) la inferencia con muchos tool-schemas es lenta: timeout holgado.
# Con GPU se puede bajar a 60-90 sin problema.
timeout     = 240
# Máximo de iteraciones del loop agéntico (anti-loop infinito).
max_iterations = 6

[memory]
# Ventana deslizante del historial conversacional (nº de turnos user+assistant).
max_turns = 20
# M5: al exceder max_turns, resumir los turnos viejos en vez de descartarlos.
# Cuesta una llamada corta al LLM por compactación; default false para no gastar.
compaction = false

# Apps que el patrón puede abrir por nombre (open_app). Edítalas para tu entorno
# (Hyprland): clave = lista de argumentos del comando. El 'terminal' se AUTODETECTA
# (kitty/foot/alacritty/...) si no lo defines aquí; el explorador de archivos también
# puedes cablearlo en 'archivos'.
[apps]
opera         = ["flatpak", "run", "com.opera.opera-gx"]
"opera gx"    = ["flatpak", "run", "com.opera.opera-gx"]
blender       = ["blender"]
vscode        = ["code"]
geany         = ["geany"]
libreoffice   = ["libreoffice"]
calculadora   = ["gnome-calculator"]
archivos      = ["nautilus"]

[voice]
# I3: 'base' es casi igual que 'small' en español y mucho más rápido en CPU.
whisper_model      = "base"
# Modelo barato solo para detectar la palabra de activación (wake).
wake_whisper_model = "tiny"
piper_voice        = "es_MX-ald-medium.onnx"
sample_rate        = 16000
# VAD (M2, de GLaDOS): 'silero' (neuronal) o 'energy' (fallback sin modelo).
vad_backend          = "silero"
vad_threshold        = 0.8
# Buffer de pre-activación: ms de audio previos que se anteponen para no perder
# las primeras sílabas.
vad_preactivation_ms = 800
# Silencio sostenido que cierra la grabación.
vad_silence_ms       = 640

[wake]
target    = "crotolamo"
threshold = 0.67
# M1: wake word dedicado con openWakeWord. 'crotolamo' no tiene modelo pre-entrenado,
# así que se usa un modelo PUENTE soportado hasta entrenar uno propio.
oww_model     = "hey_jarvis"
oww_threshold = 0.5
variants  = [
    "crotolamo", "coto y amo", "coto lamo", "coto amo", "croto lamo",
    "croto el amo", "corto lamo", "corto la mano", "crotolo amo",
    "control amo", "contro lamo", "cuatro lamo", "proto lamo", "troto lamo",
]
