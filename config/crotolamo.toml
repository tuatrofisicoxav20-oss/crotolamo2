# Configuración de Crotolamo 2.
# CERO hardcodeo: todas las rutas usan ~ y se expanden en settings.py.
# El usuario actual se detecta solo (nada de /home/exitili quemado).
#
# Para overrides locales sin tocar este archivo, crea config/crotolamo.local.toml
# (está en .gitignore) con solo las claves que quieras cambiar.

[paths]
# ~ se expande al home del usuario que corre el proceso.
home       = "~"
documentos = "~/Documentos"
descargas  = "~/Descargas"
# Voz Piper (Fase 5). Apunta a donde tengas el modelo .onnx.
voces      = "~/Documentos/crotolamo2/voices"
# Base de datos de memoria persistente (Fase 4).
db         = "~/.crotolamo/crotolamo.sqlite"
# Notas creadas por la tool create_note (Fase 3).
notas      = "~/Documentos/crotolamo_notas"

# Allowlist de raíces donde las tools de archivo pueden operar (Fase 3).
# El guard rechaza cualquier ruta fuera de estas raíces.
allowed_roots = [
    "~/Documentos",
    "~/Descargas",
    "~/.crotolamo",
]

# Proyectos del patrón sobre los que Crotolamo puede razonar (Fase 3).
[projects]
crotolamo  = "~/Documentos/crotolamo2"
huevonitis = "~/Documentos/huevonitis 4"
# Checkpoint de Crotolamo 1 guardado como referencia de migración (read-only).
crotolamo1 = "~/Documentos/crotolamo2/reference/c1_checkpoint/chapi_assistant"

[logging]
# Nivel de log de diagnóstico (DEBUG/INFO/WARNING/ERROR). La env CROTOLAMO_LOG manda.
level = "INFO"

[llm]
host        = "http://localhost:11434"
model       = "qwen2.5-coder:7b"
temperature = 0.2
# Timeout de una llamada al LLM. Bajado de 600 a 180: con tool routing los turnos
# son cortos, y 600s significaba que un Ollama colgado dejaba la voz "pensando"
# hasta 10 min. 180s cubre un arranque en frío (~60-120s) + la respuesta; si se
# excede, devuelve error en personaje y la voz vuelve a reposo (no se queda pegada).
timeout     = 180
# Máximo de iteraciones del loop agéntico (anti-loop infinito).
max_iterations = 6
# Tool routing: en vez de mandarle al modelo las ~32 tools en cada turno (lento en
# CPU: ~130s evaluando el prompt), se le mandan solo las relevantes a la consulta
# (~2-5s). Medido aquí: 6 tools = 2.4s vs 30 tools = 142s. Déjalo en true salvo
# que quieras depurar. max_tools = tope de tools por turno.
tool_routing = true
max_tools = 8
# keep_alive: cuánto mantiene Ollama el modelo residente en RAM tras responder.
# Evita pagar la recarga del modelo (~60s en frío) en cada turno de una sesión.
# OJO: el cache de prefijo NO amortiza entre turnos (cada turno re-evalúa el prompt);
# lo que hace usable el rendimiento es el tool_routing de abajo (prompt chico), no
# este keep_alive. Medido aquí con routing: charla ~5s, acción con tool ~17-22s.
# "15m" = no recarga durante la sesión y libera RAM tras 15 min ocioso. Sube a "1h"
# o "-1" (siempre residente) si te sobra RAM; baja si la lap va justa de memoria.
keep_alive = "15m"

[memory]
# Ventana deslizante del historial conversacional (nº de turnos user+assistant).
max_turns = 20
# M5: al exceder max_turns, resumir los turnos viejos en vez de descartarlos.
# Cuesta una llamada corta al LLM por compactación; default false para no gastar.
compaction = false

# Apps que el patrón puede abrir por nombre (open_app). Edítalas para tu entorno
# (Hyprland): clave = lista de argumentos del comando. El 'terminal' se AUTODETECTA
# (kitty/foot/alacritty/...) si no lo defines aquí; el explorador de archivos también
# puedes cablearlo en 'archivos'.
[apps]
opera         = ["flatpak", "run", "com.opera.opera-gx"]
"opera gx"    = ["flatpak", "run", "com.opera.opera-gx"]
spotify       = ["flatpak", "run", "com.spotify.Client"]
blender       = ["blender"]
vscode        = ["code"]
geany         = ["geany"]
libreoffice   = ["libreoffice"]
calculadora   = ["gnome-calculator"]
archivos      = ["nautilus"]

[voice]
# I3: 'base' es casi igual que 'small' en español y mucho más rápido en CPU.
whisper_model      = "base"
# Modelo barato solo para detectar la palabra de activación (wake).
wake_whisper_model = "tiny"
piper_voice        = "es_MX-ald-medium.onnx"
sample_rate        = 16000
# VAD (M2, de GLaDOS): 'silero' (neuronal) o 'energy' (fallback sin modelo).
vad_backend          = "silero"
vad_threshold        = 0.8
# Buffer de pre-activación: ms de audio previos que se anteponen para no perder
# las primeras sílabas.
vad_preactivation_ms = 800
# Silencio sostenido que cierra la grabación del comando. Subido de 640 a 900ms
# para tolerar una pausa breve tras decir "crotolamo" antes de la orden (si no, el
# comando salía vacío). Aun así, conviene decir "crotolamo" + la orden seguido.
vad_silence_ms       = 900
# M3.8: mitigación de eco del barge-in (con altavoces y sin AEC). Con auriculares
# es confiable; si con altavoces se auto-dispara, usa --no-barge-in.
barge_in_grace_ms         = 400   # ignora barge-in los primeros ms tras empezar a hablar
barge_in_threshold_margin = 0.1   # umbral VAD más alto mientras suena el TTS
barge_in_min_chunks       = 5     # racha de chunks de voz para disparar (no un pico)

[wake]
target    = "crotolamo"
# Subido de 0.67 a 0.72: el wake difuso (Whisper) daba falsos positivos ("romano"
# disparaba). Más estricto = menos fantasmas, a costa de exigir mejor pronunciación.
threshold = 0.72
# M1: wake word dedicado con openWakeWord. 'crotolamo' no tiene modelo pre-entrenado,
# así que se usa un modelo PUENTE soportado hasta entrenar uno propio.
oww_model     = "hey_jarvis"
oww_threshold = 0.5
# Variantes CERCANAS a "crotolamo" (cómo lo transcribe mal Whisper). Se podaron
# las muy lejanas ("corto la mano", "control amo", "cuatro lamo", "proto/troto
# lamo") que provocaban falsos positivos. Se añadieron mishears reales del log
# ("gotolamo", "cottoy amo"). Si ves en el log que tu "crotolamo" se transcribe
# distinto, añade esa forma aquí.
variants  = [
    "crotolamo", "croto lamo", "gotolamo", "grotolamo", "crotoamo",
    "coto lamo", "coto y amo", "cottoy amo", "croto el amo", "crotolo amo",
]
